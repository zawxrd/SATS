# ══════════════════════════════════════════════════
# SATS Bot — Configuration
# ══════════════════════════════════════════════════

# ── 交易所選擇 ────────────────────────────────────
# 支援: binance / bingx
exchange: "binance"

# ── 交易對與時間框架 ──────────────────────────────
# BingX 幣種格式填 BTCUSDT 即可，程式會自動轉成 BTC-USDT
symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT  # 可自行新增（auto_symbols 開啟時此清單無效）

interval: "1m"   # 可選: 1m 3m 5m 15m 30m 1h 2h 4h 6h 12h 1d

# ── 自動選取交易對（依成交額排名）────────────────
auto_symbols:
  enabled: true       # true = 自動抓前 top_n 名；false = 使用上方 symbols 清單
  top_n: 200         # 取前幾名（建議 50~200）
  quote: "USDT"       # 計價幣篩選（USDT / USDC / BTC）

# ── Discord 通知 ──────────────────────────────────
discord:
  webhook_url: "https://discord.com/api/webhooks/1493899441307127880/26jh4eH5m07uG2F6JVm4lNmIvZduHjqxd-mURwa2mEBjtsjqaPvf_LMTYLzlE74esd-e"
  # 可以設定多個 Webhook（不同頻道）
  # webhook_url_alerts: "https://discord.com/api/webhooks/..."
  mention_role_id: ""      # 填入 Role ID 可 @mention，留空不 mention
  username: "SATS Bot 🤖"
  avatar_url: ""           # Bot 頭像 URL（可留空）
  #指令開關
  bot_enabled: false           # false = 只用 Webhook，不啟動指令 Bot
  bot_token: "YOUR_TOKEN"
  command_channel_id: 123456789
  admin_role_id: 987654321

# ── 主要參數 (對應 Pine Script Main Settings) ────
main:
  base_mult: 2.0           # Base Band Width (xATR)
  atr_len: 14              # ATR Length（Auto 模式下由 interval 決定）
  use_preset: "Auto"       # Auto / Scalping / Default / Swing / Crypto 24/7 / Custom

# ── 自適應引擎 ────────────────────────────────────
adaptive:
  enabled: true
  er_length: 20
  adapt_strength: 0.5
  atr_baseline_len: 100

# ── Trend Quality Engine ──────────────────────────
tqi:
  enabled: true
  quality_strength: 0.4
  quality_curve: 1.5
  smooth_mult: true
  asymmetric_bands: true
  asym_strength: 0.5
  efficiency_weighted_atr: true
  char_flip: true
  char_flip_min_age: 5
  char_flip_high: 0.55
  char_flip_low: 0.25
  # TQI 因子權重
  weight_er: 0.35
  weight_vol: 0.20
  weight_struct: 0.25
  weight_mom: 0.20
  struct_len: 20
  mom_len: 10

# ── 風險管理 ──────────────────────────────────────
risk:
  sl_atr_mult: 1.5
  tp_mode: "Dynamic"         # Fixed / Dynamic
  tp1_r: 1.0
  tp2_r: 2.0
  tp3_r: 3.0
  breakeven: true          # 當觸及 TP1 時，自動將止損移至進場價

# ── Dynamic TP ────────────────────────────────────
dynamic_tp:
  tqi_weight: 0.6
  vol_weight: 0.4
  min_scale: 0.5
  max_scale: 2.0
  floor_r1: 0.5
  ceil_r3: 8.0

# ── 訊號過濾 ──────────────────────────────────────
filters:
  use_rsi: true
  rsi_len: 14
  rsi_ob: 70
  rsi_os: 30
  rsi_lookback: 20
  use_volume: true
  vol_len: 20
  use_structure: true
  pivot_len: 3
  min_score: 35            # 最低訊號分數才發通知

# ── 系統設定 ──────────────────────────────────────
system:
  warmup_bars: 50          # 預熱 K 棒數（低於此數不發訊號）
  log_level: "INFO"        # DEBUG / INFO / WARNING
  log_file: "sats_bot.log"
  reconnect_delay: 5       # WebSocket 斷線重連秒數
  max_reconnect: 10
  hourly_report_interval: 300   # 每小時報告間隔（秒）；改 300 可測試 5 分鐘一次
